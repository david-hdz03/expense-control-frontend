name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main # Cambia a 'master' si tu rama principal se llama así

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Usa la versión estable de Flutter

      - name: Instalar dependencias
        run: flutter pub get

      - name: Verificar si el secreto existe
        run: |
          if [ -z "${{ secrets.API_URL }}" ]; then
            echo "🚨 EL SECRETO ESTÁ VACÍO. GitHub no lo está leyendo."
            exit 1 # Esto detendrá el workflow para que no pierdas tiempo compilando
          else
            echo "✅ El secreto se cargó correctamente."
          fi

      - name: Compilar Flutter Web
        run: flutter build web --release --base-href "/expense-control-frontend/" --dart-define="API_BASE_URL=${{ secrets.API_URL }}"

      - name: Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
